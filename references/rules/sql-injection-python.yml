  any:
  - all:
    - pattern: '$CURSOR.execute($Q)

        '
    - regex: execute\(f\".*\{.*\}.*\"\)
  - pattern: '$CURSOR.execute($SQL % $VAR)

      '
  - pattern: '$CURSOR.execute($SQL.format($$$ARGS))

      '
  - pattern: '$CURSOR.execute($SQL + $VAR)

      '
