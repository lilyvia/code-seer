id: sql-injection-go
language: go
severity: error
message: 'SQL注入（Go） (CWE-89)'
name: SQL注入（Go）
description: 在Go代码中，如果通过字符串拼接或 fmt.Sprintf 动态构造 SQL，攻击者可注入恶意 SQL 代码。
cwe: CWE-89
remediation: '使用参数化查询替代动态SQL拼接：

  ```go

  // 不安全的代码 ❌

  db.Query(fmt.Sprintf("SELECT * FROM users WHERE id = %s", userID))

  db.Exec("DELETE FROM users WHERE id = " + userID)

  // 安全的代码 ✅

  db.Query("SELECT * FROM users WHERE id = ?", userID)

  db.Exec("DELETE FROM users WHERE id = ?", userID)

  ```

  '
rule:
  kind: call_expression
  any:
  - all:
    - pattern: '$FN(fmt.Sprintf($FMT, $ARG))

        '
      kind: call_expression
    - regex: \.(Query|Exec)\(
  - all:
    - pattern: '$FN($SQL + $VAR)

        '
      kind: call_expression
    - regex: \.(Query|Exec)\(
  - all:
    - pattern: '$FN(fmt.Sprintf($FMT, $ARG1, $ARG2))

        '
      kind: call_expression
    - regex: \.(Query|Exec)\(
