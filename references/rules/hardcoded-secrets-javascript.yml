id: hardcoded-secrets-javascript
language: javascript
severity: error
message: '硬编码密钥检测（JavaScript） (CWE-798)'
name: 硬编码密钥（JavaScript）
description: JavaScript/Node.js 代码中硬编码的 API 密钥、数据库密码、JWT 密钥或其他敏感凭据会导致严重的安全风险。
cwe: CWE-798
remediation: '使用环境变量或密钥管理服务：

  ```javascript

  // 不安全的代码 ❌

  const apiKey = "sk-1234567890abcdef";

  const dbPassword = "mysecretpassword";

  const jwtSecret = "hardcoded-secret-key";

  const awsAccessKey = "AKIAIOSFODNN7EXAMPLE";

  // 安全的代码 ✅

  // 使用环境变量

  const apiKey = process.env.API_KEY;

  const dbPassword = process.env.DB_PASSWORD;

  const jwtSecret = process.env.JWT_SECRET;

  // 使用 dotenv 加载 .env 文件

  require("dotenv").config();

  const apiKey = process.env.API_KEY;

  // 使用密钥管理服务

  // AWS Secrets Manager

  const AWS = require("aws-sdk");

  const secretsManager = new AWS.SecretsManager();

  const secret = await secretsManager.getSecretValue({ SecretId: "my-secret" }).promise();

  ```

  '
rule:
  any:
  - all:
    - pattern: 'const $VAR = $VALUE'
    - regex: '(?i)const\s+(api[_-]?key|secret[_-]?key|access[_-]?token|jwt[_-]?secret|password|pwd|passwd|db[_-]?password|jwt_secret|token|private_key)\s*=\s*["''][^"'']{6,}["'']'

  # false-negative coverage expansion
  - kind: program
    regex: '(?i)(process\.env\.[A-Z0-9_]*(SECRET|TOKEN|KEY|PASSWORD)[A-Z0-9_]*\s*\|\|\s*["''][^"'']{6,}["''])'
  - kind: program
    regex: '(?i)(firebase|twilio|sendgrid|aws).*?(apiKey|secretAccessKey|authToken)\s*[:=]\s*["''][^"'']{6,}["'']'

  # false-negative coverage expansion - service token patterns
  - kind: variable_declarator
    regex: '(?i)github_pat_[A-Za-z0-9_]{22,}'
  - kind: variable_declarator
    regex: '(?i)glpat-[A-Za-z0-9\\-]{20,}'
  - kind: variable_declarator
    regex: '(?i)dckr_pat_[A-Za-z0-9_-]{27,}'
  - kind: variable_declarator
    regex: '(?i)npm_[A-Za-z0-9]{36}'
  - kind: variable_declarator
    regex: '(?i)pypi-[A-Za-z0-9_-]{32,}'
  - kind: variable_declarator
    regex: '(?i)sk-[A-Za-z0-9]{20,}'
  - kind: variable_declarator
    regex: '(?i)sk-ant-[A-Za-z0-9]{32,}'
  - kind: variable_declarator
    regex: '(?i)AIza[0-9A-Za-z_-]{35}'
  - kind: variable_declarator
    regex: '(?i)pk_(live|test)_[A-Za-z0-9]{24,}'
  - kind: variable_declarator
    regex: '(?i)SG\\.[A-Za-z0-9_-]{22,}'
  - kind: variable_declarator
    regex: '(?i)key-[A-Fa-f0-9]{32}'
  - kind: variable_declarator
    regex: '(?i)(mongodb|mysql|postgres|postgresql)://[^:]+:[^@]+@'
