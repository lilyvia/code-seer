id: sql-injection-java
language: java
severity: error
message: 'SQL注入（Java） (CWE-89)'
name: SQL注入（Java）
description: SQL注入会在动态拼接SQL语句时发生。
cwe: CWE-89
remediation: '使用参数化查询（PreparedStatement）替代动态字符串拼接：

  ```java

  // 不安全的代码 ❌

  stmt.executeQuery("SELECT * FROM users WHERE id = " + userId);

  stmt.executeQuery(String.format("SELECT * FROM users WHERE name = ''%s''", name));

  // 安全的代码 ✅

  PreparedStatement ps = conn.prepareStatement("SELECT * FROM users WHERE id = ?");

  ps.setString(1, userId);

  ps.executeQuery();

  ```

  '
rule:
  any:
  - pattern: '$STMT.executeQuery($SQL + $VAR)'
    kind: method_invocation
  - pattern: '$STMT.execute($SQL + $VAR)'
    kind: method_invocation
  - pattern: '$STMT.executeUpdate($SQL + $VAR)'
    kind: method_invocation
  - pattern: '$STMT.executeBatch($SQL + $VAR)'
    kind: method_invocation
  - pattern: '$STMT.executeQuery(String.format($FMT, $$$ARGS))'
    kind: method_invocation
  - pattern: '$STMT.execute(String.format($FMT, $$$ARGS))'
    kind: method_invocation
  - pattern: '$STMT.executeUpdate(String.format($FMT, $$$ARGS))'
    kind: method_invocation
  - pattern: '$STMT.executeQuery(new StringBuilder().append($A).append($VAR).toString())'
    kind: method_invocation
  - pattern: '$STMT.execute(new StringBuilder().append($A).append($VAR).toString())'
    kind: method_invocation
  - pattern: '$STMT.executeUpdate(new StringBuilder().append($A).append($VAR).toString())'
    kind: method_invocation
  - pattern: '$STMT.executeQuery($SQL.concat($VAR))'
    kind: method_invocation
  - pattern: '$STMT.execute($SQL.concat($VAR))'
    kind: method_invocation
  - pattern: '$JT.query($SQL + $VAR, $$$)'
    kind: method_invocation
  - pattern: '$JT.update($SQL + $VAR)'
    kind: method_invocation
  - pattern: '$JT.execute($SQL + $VAR)'
    kind: method_invocation
  - pattern: '$JT.query(String.format($FMT, $$$ARGS), $$$)'
    kind: method_invocation
  - pattern: '$JT.update(String.format($FMT, $$$ARGS))'
    kind: method_invocation
  - pattern: '$JT.execute(String.format($FMT, $$$ARGS))'
    kind: method_invocation
  - pattern: '$JT.query(new StringBuilder().append($A).append($VAR).toString(), $$$)'
    kind: method_invocation
  - pattern: '$JT.update(new StringBuilder().append($A).append($VAR).toString())'
    kind: method_invocation
  - pattern: '$JT.execute(new StringBuilder().append($A).append($VAR).toString())'
    kind: method_invocation
  - pattern: '$JT.query($SQL.concat($VAR), $$$)'
    kind: method_invocation
  - pattern: '$JT.update($SQL.concat($VAR))'
    kind: method_invocation
  - pattern: '$JT.execute($SQL.concat($VAR))'
    kind: method_invocation
  - pattern: '$EM.createNativeQuery($SQL + $VAR)'
    kind: method_invocation
  - pattern: '$EM.createQuery($SQL + $VAR)'
    kind: method_invocation
  - pattern: '$EM.createNativeQuery(String.format($FMT, $$$ARGS))'
    kind: method_invocation
  - pattern: '$EM.createQuery(String.format($FMT, $$$ARGS))'
    kind: method_invocation
  - pattern: '$EM.createNativeQuery(new StringBuilder().append($A).append($VAR).toString())'
    kind: method_invocation
  - pattern: '$EM.createQuery(new StringBuilder().append($A).append($VAR).toString())'
    kind: method_invocation
  - pattern: '$EM.createNativeQuery($SQL.concat($VAR))'
    kind: method_invocation
  - pattern: '$EM.createQuery($SQL.concat($VAR))'
    kind: method_invocation
  - pattern: '@Query(nativeQuery = true, value = $SQL + $VAR)'
    kind: annotation
  - pattern: '@Query(nativeQuery = true, value = String.format($FMT, $$$ARGS))'
    kind: annotation
  - pattern: '@Query(nativeQuery = true, value = new StringBuilder().append($A).append($VAR).toString())'
    kind: annotation
  - pattern: '@Query(nativeQuery = true, value = $SQL.concat($VAR))'
    kind: annotation

  # false-negative coverage expansion
  - kind: method_invocation
    pattern: '$SESSION.createSQLQuery($SQL + $VAR)'
  - kind: method_invocation
    pattern: '$TEMPLATE.queryForObject($SQL + $VAR, $$$)'
  - kind: method_invocation
    pattern: '$TEMPLATE.queryForList($SQL + $VAR, $$$)'
  - kind: method_invocation
    pattern: '$TEMPLATE.batchUpdate($SQL + $VAR)'
  - kind: method_invocation
    pattern: '$SQLSESSION.selectOne($ID, $PARAM)'
    regex: '(?i)(mybatis|sqlSession|selectOne|selectList|user|param|input)'
  # false-negative coverage expansion - additional ORM sinks
  - kind: method_invocation
    pattern: '$TEMPLATE.query($SQL, $$$)'
    regex: '(?i)(\+|\.format\(|\.concat\(|StringBuilder)'
  - kind: method_invocation
    pattern: '$TEMPLATE.update($SQL, $$$)'
    regex: '(?i)(\+|\.format\(|\.concat\(|StringBuilder)'
  - kind: method_invocation
    pattern: '$TEMPLATE.execute($SQL)'
    regex: '(?i)(\+|\.format\(|\.concat\(|StringBuilder)'
  - kind: method_invocation
    pattern: '$SESSION.createQuery($HQL + $VAR)'
  - kind: method_invocation
    pattern: '$SESSION.createQuery(String.format($FMT, $$$))'
  - kind: annotation
    pattern: '@Select($SQL)'
    regex: '\$\{'
  - kind: annotation
    pattern: '@Update($SQL)'
    regex: '\$\{'
  - kind: annotation
    pattern: '@Delete($SQL)'
    regex: '\$\{'
  - kind: method_invocation
    pattern: '$PATHBUILDER.get($USER_INPUT)'
    regex: '(?i)(user|input|param|request|query)'
  - kind: method_invocation
    pattern: 'new OrderSpecifier($ORDER, $PATHBUILDER.get($INPUT))'
    regex: '(?i)(user|input|param|request|query)'
