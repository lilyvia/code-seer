id: open-redirect-rust
language: rust
severity: warning
message: '开放重定向（Rust） (CWE-601)'
name: 开放重定向（Rust）
description: |
  将用户输入直接用于 HTTP 响应跳转目标，可能导致开放重定向漏洞，
  攻击者可借此将用户引导至恶意站点。
cwe: CWE-601
remediation: |
  对跳转目标执行白名单、同源或相对路径校验：
  ```rust
  // 不安全的代码 ❌
  HttpResponse::Found().header("Location", user_url)
  Redirect::to(user_url)

  // 安全的代码 ✅
  fn safe_redirect(target: &str) -> Result<String, Box<dyn std::error::Error>> {
      let allowed_hosts = ["example.com"];
      let url = reqwest::Url::parse(target)?;
      if url.host_str().map_or(false, |host| !allowed_hosts.contains(&host)) {
          return Err("非法跳转目标".into());
      }
      Ok(target.to_string())
  }

  let safe = safe_redirect(user_url)?;
  HttpResponse::Found().header("Location", safe)
  ```
rule:
  kind: call_expression
  any:
  - pattern: 'HttpResponse::Found().header("Location", $USER_URL)'
    regex: '(user_|request|param|input|arg|query|body|payload)'
  - pattern: 'HttpResponse::SeeOther().header("Location", $USER_URL)'
    regex: '(user_|request|param|input|arg|query|body|payload)'
  - pattern: 'HttpResponse::TemporaryRedirect().header("Location", $USER_URL)'
    regex: '(user_|request|param|input|arg|query|body|payload)'
  - pattern: 'Redirect::to($USER_URL)'
    regex: '(user_|request|param|input|arg|query|body|payload)'
  - pattern: 'warp::redirect::see_other($USER_URL)'
    regex: '(user_|request|param|input|arg|query|body|payload)'
  - pattern: 'warp::redirect::temporary($USER_URL)'
    regex: '(user_|request|param|input|arg|query|body|payload)'
  - pattern: 'warp::redirect::permanent($USER_URL)'
    regex: '(user_|request|param|input|arg|query|body|payload)'
