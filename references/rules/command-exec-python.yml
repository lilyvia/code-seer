id: python-command-exec
language: python
name: 命令执行漏洞（Python）
description: 命令执行漏洞允许攻击者在服务器上执行任意系统命令。
cwe: CWE-78
remediation: |
  避免直接执行用户输入，优先使用参数化调用和白名单校验。
  ```python
  # 不安全的代码 ❌
  os.system(user_input)
  subprocess.run(command, shell=True)
  eval(user_code)
  # 更安全的代码 ✅
  subprocess.run(['ls', '-la'], check=True, capture_output=True, text=True)
  allowed_commands = {'ls', 'pwd', 'whoami'}
  if user_command in allowed_commands:
      subprocess.run([user_command], check=True, capture_output=True, text=True)
  ```
rule:
  any:
    - pattern: os.system($USER_INPUT)
    - pattern: os.popen($USER_INPUT)
    - pattern: subprocess.call($CMD, shell=True)
    - pattern: subprocess.run($CMD, shell=True)
    - pattern: subprocess.Popen($CMD, shell=True)
    - pattern: subprocess.check_output($CMD, shell=True)
    - pattern: subprocess.check_call($CMD, shell=True)
    - pattern: eval($USER_CODE)
    - pattern: exec($USER_CODE)
    - pattern: compile($USER_CODE, $FILENAME, $MODE)
