id: command-exec-python
language: python
severity: error
message: '命令执行漏洞（Python） (CWE-78)'
name: 命令执行漏洞（Python）
description: 命令执行漏洞允许攻击者在服务器上执行任意系统命令。
cwe: CWE-78
remediation: "避免直接执行用户输入，优先使用参数化调用和白名单校验。\n```python\n# 不安全的代码 ❌\nos.system(user_input)\nsubprocess.run(command,\
  \ shell=True)\neval(user_code)\n# 更安全的代码 ✅\nsubprocess.run(['ls', '-la'], check=True, capture_output=True,\
  \ text=True)\nallowed_commands = {'ls', 'pwd', 'whoami'}\nif user_command in allowed_commands:\n   \
  \ subprocess.run([user_command], check=True, capture_output=True, text=True)\n```\n"
rule:
  kind: call
  any:
  - pattern: os.system($USER_INPUT)
  - pattern: os.popen($USER_INPUT)
  - pattern: subprocess.call($CMD, shell=True)
  - pattern: subprocess.run($CMD, shell=True)
  - pattern: subprocess.Popen($CMD, shell=True)
  - pattern: subprocess.check_output($CMD, shell=True)
  - pattern: subprocess.check_call($CMD, shell=True)
  - pattern: eval($USER_CODE)
  - pattern: exec($USER_CODE)
  - pattern: compile($USER_CODE, $FILENAME, $MODE)

  # false-negative coverage expansion
  - pattern: 'asyncio.create_subprocess_shell($CMD)'
  - pattern: 'asyncio.create_subprocess_exec("sh", "-c", $CMD)'
  - pattern: 'pexpect.spawn($CMD)'
  - pattern: '$SSH.exec_command($CMD)'
  - pattern: '$CONN.run($CMD)'
