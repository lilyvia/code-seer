id: hardcoded-secrets-rust
language: rust
severity: error
message: '硬编码密钥（Rust） (CWE-798)'
name: 硬编码密钥（Rust）
description: Rust 项目中常见风险是将密钥声明为 const 或 static，或在 let 绑定中写死凭证。
cwe: CWE-798
remediation: |
  使用环境变量或密钥管理工具，不要将凭证写入源码：
  ```rust
  // 不安全的代码 ❌
  const API_KEY: &str = "sk_test_1234567890abcdef";
  static DB_PASSWORD: &str = "MyDbPass123!";
  let api_key = "sk_test_1234567890abcdef";

  // 安全的代码 ✅
  use std::env;
  let api_key = env::var("API_KEY").expect("API_KEY not set");
  let db_password = env::var("DB_PASSWORD").expect("DB_PASSWORD not set");

  // 推荐结合密钥管理系统进行统一轮换
  // AWS Secrets Manager、Vault 等
  ```
rule:
  any:
  - all:
    - pattern: 'const $NAME: $TYPE = $VALUE;'
      kind: const_item
    - regex: (?i)const\s+(api[_-]?key|secret[_-]?key|access[_-]?token|jwt[_-]?secret)\s*:\s*&?\w+\s*=\s*['"][A-Za-z0-9_\-\./+=]{12,}['"]
  - all:
    - pattern: 'const $NAME: $TYPE = $VALUE;'
      kind: const_item
    - regex: (?i)const\s+(password|pwd|passwd)\s*:\s*&?\w+\s*=\s*['"][^'"]{6,}['"]
  - all:
    - pattern: 'const $NAME: $TYPE = $VALUE;'
      kind: const_item
    - regex: (?i)const\s+(db[_-]?(user|username|password|pass|pwd)|database[_-]?url|connection[_-]?string)\s*:\s*&?\w+\s*=\s*['"][^'"]{8,}['"]
  - all:
    - pattern: 'static $NAME: $TYPE = $VALUE;'
      kind: static_item
    - regex: (?i)static\s+(api[_-]?key|secret[_-]?key|access[_-]?token|jwt[_-]?secret)\s*:\s*&?\w+\s*=\s*['"][A-Za-z0-9_\-\./+=]{12,}['"]
  - all:
    - pattern: 'static $NAME: $TYPE = $VALUE;'
      kind: static_item
    - regex: (?i)static\s+(password|pwd|passwd)\s*:\s*&?\w+\s*=\s*['"][^'"]{6,}['"]
  - all:
    - pattern: 'static $NAME: $TYPE = $VALUE;'
      kind: static_item
    - regex: (?i)static\s+(db[_-]?(user|username|password|pass|pwd)|database[_-]?url|connection[_-]?string)\s*:\s*&?\w+\s*=\s*['"][^'"]{8,}['"]
  - all:
    - pattern: 'let $NAME = $VALUE;'
      kind: let_declaration
    - regex: (?i)let\s+(api[_-]?key|secret[_-]?key|access[_-]?token|jwt[_-]?secret)\s*=\s*['"][A-Za-z0-9_\-\./+=]{12,}['"]
  - all:
    - pattern: 'let $NAME = $VALUE;'
      kind: let_declaration
    - regex: (?i)let\s+(password|pwd|passwd)\s*=\s*['"][^'"]{6,}['"]
  - all:
    - pattern: 'let $NAME = $VALUE;'
      kind: let_declaration
    - regex: (?i)(postgres(ql)?|mysql|mongodb)(\+srv)?:\/\/
  - all:
    - pattern: 'let $NAME = $VALUE;'
      kind: let_declaration
    - regex: (?i)['"]AKIA[0-9A-Z]{16}['"]
  - all:
    - pattern: 'let $NAME = $VALUE;'
      kind: let_declaration
    - regex: (?i)['"](xox[baprs]-[A-Za-z0-9-]{10,}|ghp_[A-Za-z0-9]{20,}|sk_(live|test)_[A-Za-z0-9]{16,})['"]
  - all:
    - pattern: 'let $NAME = $VALUE;'
      kind: let_declaration
    - regex: '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'
  - all:
    - pattern: 'let $NAME = $VALUE;'
      kind: let_declaration
    - regex: (?i)(token|secret|key)\s*=\s*['"][A-Za-z0-9+/=_\-]{24,}['"]

  # false-negative coverage expansion - service token patterns
  - kind: let_declaration
    regex: '(?i)github_pat_[A-Za-z0-9_]{22,}'
  - kind: let_declaration
    regex: '(?i)glpat-[A-Za-z0-9\\-]{20,}'
  - kind: let_declaration
    regex: '(?i)dckr_pat_[A-Za-z0-9_-]{27,}'
  - kind: let_declaration
    regex: '(?i)npm_[A-Za-z0-9]{36}'
  - kind: let_declaration
    regex: '(?i)pypi-[A-Za-z0-9_-]{32,}'
  - kind: let_declaration
    regex: '(?i)sk-[A-Za-z0-9]{20,}'
  - kind: let_declaration
    regex: '(?i)sk-ant-[A-Za-z0-9]{32,}'
  - kind: let_declaration
    regex: '(?i)AIza[0-9A-Za-z_-]{35}'
  - kind: let_declaration
    regex: '(?i)pk_(live|test)_[A-Za-z0-9]{24,}'
  - kind: let_declaration
    regex: '(?i)SG\\.[A-Za-z0-9_-]{22,}'
  - kind: let_declaration
    regex: '(?i)key-[A-Fa-f0-9]{32}'
  - kind: let_declaration
    regex: '(?i)(mongodb|mysql|postgres|postgresql)://[^:]+:[^@]+@'
