id: python-hardcoded-secrets
language: python
name: 硬编码密钥（Python）
message: 检测到硬编码的敏感信息：API密钥、密码或Token
description: |
  硬编码密钥是严重的安全风险，可能导致：
  - 代码泄露导致凭证暴露
  - 无法轮换密钥
  - 难以管理多个环境的密钥

  此规则检测到：
  - API密钥（AWS AKIA、常见Token格式）
  - 密码赋值（password、pwd、passwd）
  - 数据库连接字符串（jdbc、mysql、postgres、mongodb）
  - JWT Secret
  - 私钥标记（BEGIN PRIVATE KEY）
  - 高熵随机字符串
severity: error
risk_severity: 高危
cwe: CWE-798
remediation: |
  使用环境变量或密钥管理服务：

  ```python
  # 不安全的代码 ❌
  API_KEY = "sk-1234567890abcdef"
  PASSWORD = "mysecretpassword"

  # 安全的代码 ✅
  import os
  from dotenv import load_dotenv

  load_dotenv()
  API_KEY = os.getenv("API_KEY")
  PASSWORD = os.getenv("DB_PASSWORD")

  # 或者使用密钥管理服务
  # AWS Secrets Manager、Azure Key Vault、HashiCorp Vault
  ```
rule:
  any:
    - all:
        - pattern: |
            $NAME = $VALUE
        - regex: "(?i)(api[_-]?key|secret[_-]?key|access[_-]?token|jwt[_-]?secret)\\s*=\\s*['\"][A-Za-z0-9_\\-\\./+=]{12,}['\"]"
    - all:
        - pattern: |
            $NAME = $VALUE
        - regex: "(?i)(password|pwd|passwd)\\s*=\\s*['\"][^'\"]{6,}['\"]"
    - all:
        - pattern: |
            $NAME = $VALUE
        - regex: "(?i)(db[_-]?(user|username|password|pass|pwd)|database[_-]?url|connection[_-]?string)\\s*=\\s*['\"][^'\"]{8,}['\"]"
    - all:
        - pattern: |
            $NAME = $VALUE
        - regex: "(?i)(jdbc:mysql|jdbc:postgresql|mongodb(\\+srv)?:\\/\\/|mysql:\\/\\/|postgres(ql)?:\\/\\/)"
    - all:
        - pattern: |
            $NAME = $VALUE
        - regex: "(?i)['\"]AKIA[0-9A-Z]{16}['\"]"
    - all:
        - pattern: |
            $NAME = $VALUE
        - regex: "(?i)['\"](xox[baprs]-[A-Za-z0-9-]{10,}|ghp_[A-Za-z0-9]{20,}|sk_(live|test)_[A-Za-z0-9]{16,})['\"]"
    - all:
        - pattern: |
            $NAME = $VALUE
        - regex: "-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----"
    - all:
        - pattern: |
            $NAME = $VALUE
        - regex: "(?i)(token|secret|key)\\s*=\\s*['\"][A-Za-z0-9+/=_\\-]{24,}['\"]"
