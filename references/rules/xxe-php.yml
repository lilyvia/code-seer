id: xxe-php
language: php
severity: warning
message: 'XXE XML外部实体注入（PHP） (CWE-611)'
name: XXE XML外部实体注入（PHP）
description: PHP处理XML时，如果启用了实体替换或外部DTD，攻击者可构造恶意XML触发XXE。
cwe: CWE-611
remediation: '使用安全的XML解析参数，避免启用实体替换：

  ```php

  // 不安全的代码 ❌

  $doc = new DOMDocument();

  $doc->loadXML($xml, LIBXML_NOENT | LIBXML_DTDLOAD);

  // 安全的代码 ✅

  $doc = new DOMDocument();

  $doc->resolveExternals = false;

  $doc->substituteEntities = false;

  $doc->loadXML($xml, LIBXML_NONET);

  // 对simplexml同样避免 NOENT/DTD 相关选项

  $obj = simplexml_load_string($xml, ''SimpleXMLElement'', LIBXML_NONET);

  ```

  '
rule:
  any:
  - kind: function_call_expression
    pattern: 'libxml_disable_entity_loader(false)'
  - kind: member_call_expression
    pattern: '$DOC->loadXML($XML, LIBXML_NOENT)'
  - kind: member_call_expression
    pattern: '$DOC->loadXML($XML, LIBXML_DTDLOAD)'
  - kind: member_call_expression
    pattern: '$DOC->loadXML($XML, LIBXML_DTDATTR)'
  - kind: function_call_expression
    pattern: 'simplexml_load_string($XML, $CLASS, LIBXML_NOENT)'
  - kind: function_call_expression
    pattern: 'simplexml_load_string($XML, $CLASS, LIBXML_DTDLOAD)'
  - kind: function_call_expression
    pattern: 'simplexml_load_file($XML_FILE, $CLASS, LIBXML_NOENT)'
  - kind: member_call_expression
    pattern: '$READER->XML($XML)'
  - kind: member_call_expression
    pattern: '$READER->open($XML_PATH)'

  # false-negative coverage expansion
  - pattern: 'simplexml_load_string($XML)'
  - pattern: '$DOC->loadXML($XML, LIBXML_NOENT)'
