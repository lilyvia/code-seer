id: hardcoded-secrets-java
language: java
severity: error
message: '硬编码密钥（Java） (CWE-798)'
name: 硬编码密钥（Java）
description: 在Java项目中将密钥或密码直接写入字符串字面量，会导致凭证泄露和轮换困难。
cwe: CWE-798
remediation: '避免在代码中硬编码凭证，改为配置中心或密钥管理服务：

  ```java

  // 不安全的代码 ❌

  String apiKey = "sk_live_1234567890abcdef";

  String password = "P@ssw0rd!";

  // 安全的代码 ✅

  String apiKey = System.getenv("API_KEY");

  String password = System.getenv("DB_PASSWORD");

  // 可结合配置管理与密钥托管

  // AWS Secrets Manager、Azure Key Vault、HashiCorp Vault

  ```

  '
rule:
  kind: local_variable_declaration
  any:
  - all:
    - pattern: 'String $NAME = $VALUE;

        '
      kind: local_variable_declaration
    - regex: (?i)String\s+(api[_-]?key|secret[_-]?key|access[_-]?token|jwt[_-]?secret)\s*=\s*['"][A-Za-z0-9_\-\./+=]{12,}['"]
  - all:
    - pattern: 'String $NAME = $VALUE;

        '
      kind: local_variable_declaration
    - regex: (?i)String\s+(password|pwd|passwd)\s*=\s*['"][^'"]{6,}['"]
  - all:
    - pattern: 'String $NAME = $VALUE;

        '
      kind: local_variable_declaration
    - regex: (?i)String\s+(db[_-]?(user|username|password|pass|pwd)|database[_-]?url|connection[_-]?string)\s*=\s*['"][^'"]{8,}['"]
  - all:
    - pattern: 'String $NAME = $VALUE;

        '
      kind: local_variable_declaration
    - regex: (?i)jdbc:(mysql|postgresql|sqlserver|oracle):\/\/
  - all:
    - pattern: 'String $NAME = $VALUE;

        '
      kind: local_variable_declaration
    - regex: (?i)['"]AKIA[0-9A-Z]{16}['"]
  - all:
    - pattern: 'String $NAME = $VALUE;

        '
      kind: local_variable_declaration
    - regex: (?i)['"](xox[baprs]-[A-Za-z0-9-]{10,}|ghp_[A-Za-z0-9]{20,}|sk_(live|test)_[A-Za-z0-9]{16,})['"]
  - all:
    - pattern: 'String $NAME = $VALUE;

        '
      kind: local_variable_declaration
    - regex: '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'
  - all:
    - pattern: 'String $NAME = $VALUE;

        '
      kind: local_variable_declaration
    - regex: (?i)(token|secret|key)\s*=\s*['"][A-Za-z0-9+/=_\-]{24,}['"]

  # false-negative coverage expansion - service token patterns
  - kind: local_variable_declaration
    regex: '(?i)github_pat_[A-Za-z0-9_]{22,}'
  - kind: local_variable_declaration
    regex: '(?i)glpat-[A-Za-z0-9\\-]{20,}'
  - kind: local_variable_declaration
    regex: '(?i)dckr_pat_[A-Za-z0-9_-]{27,}'
  - kind: local_variable_declaration
    regex: '(?i)npm_[A-Za-z0-9]{36}'
  - kind: local_variable_declaration
    regex: '(?i)pypi-[A-Za-z0-9_-]{32,}'
  - kind: local_variable_declaration
    regex: '(?i)sk-[A-Za-z0-9]{20,}'
  - kind: local_variable_declaration
    regex: '(?i)sk-ant-[A-Za-z0-9]{32,}'
  - kind: local_variable_declaration
    regex: '(?i)AIza[0-9A-Za-z_-]{35}'
  - kind: local_variable_declaration
    regex: '(?i)pk_(live|test)_[A-Za-z0-9]{24,}'
  - kind: local_variable_declaration
    regex: '(?i)SG\\.[A-Za-z0-9_-]{22,}'
  - kind: local_variable_declaration
    regex: '(?i)key-[A-Fa-f0-9]{32}'
  - kind: local_variable_declaration
    regex: '(?i)(mongodb|mysql|postgres|postgresql)://[^:]+:[^@]+@'
