id: auth-defects-php
language: php
severity: warning
message: '鉴权缺陷（PHP） (CWE-287)'
name: 鉴权缺陷（PHP）
description: PHP/Laravel 项目若缺少中间件、角色检查和资源归属校验，
cwe: CWE-287
remediation: |
  在路由和控制器双层实施鉴权：
  ```php
  // 路由层
  Route::middleware(['auth', 'can:admin'])->group(function () {
      Route::delete('/admin/users/{id}', [AdminController::class, 'deleteUser']);
  });
  // 控制器层
  public function showOrder(Request $request, int $id)
  {
      $order = Order::findOrFail($id);
      if ($order->user_id !== $request->user()->id) {
          abort(403, '禁止访问他人订单');
      }
      return response()->json($order);
  }
  ```
  建议：
  - 管理功能强制使用 auth + 角色/策略中间件
  - 控制器中校验资源归属
  - 避免仅依赖前端隐藏按钮做权限控制
rule:
  any:
    - pattern: $MODEL::findOrFail($REQUEST->input($KEY))
    - pattern: $MODEL::findOrFail($REQUEST->get($KEY))
    - pattern: $MODEL::find($REQUEST->input($KEY))
    - pattern: $MODEL::find($REQUEST->get($KEY))
    - pattern: $MODEL::where('id', $REQUEST->input($KEY))->first()
    - pattern: $MODEL::where('id', $REQUEST->get($KEY))->first()
    - pattern: |
        if (Auth::check()) {
            $MODEL::where($$$)->delete();
        }
    - pattern: |
        if (Auth::check()) {
            $MODEL::where($$$)->forceDelete();
        }

    # false-negative coverage expansion
    - pattern: 'Route::$METHOD($PATH, $HANDLER)'
      regex: '(admin|api|users|orders)'
