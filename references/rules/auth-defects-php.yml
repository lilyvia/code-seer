id: php-auth-defects
language: php
name: 鉴权缺陷（PHP）
description: PHP/Laravel 项目若缺少中间件、角色检查和资源归属校验，
cwe: CWE-287
remediation: |
  在路由和控制器双层实施鉴权：
  ```php
  // 路由层
  Route::middleware(['auth', 'can:admin'])->group(function () {
      Route::delete('/admin/users/{id}', [AdminController::class, 'deleteUser']);
  });
  // 控制器层
  public function showOrder(Request $request, int $id)
  {
      $order = Order::findOrFail($id);
      if ($order->user_id !== $request->user()->id) {
          abort(403, '禁止访问他人订单');
      }
      return response()->json($order);
  }
  ```
  建议：
  - 管理功能强制使用 auth + 角色/策略中间件
  - 控制器中校验资源归属
  - 避免仅依赖前端隐藏按钮做权限控制
rule:
  any:
    - pattern: |
        Route::get('/admin', [$CTRL::class, '$ACTION']);
    - pattern: |
        Route::get('/admin/users', [$CTRL::class, '$ACTION']);
    - pattern: |
        Route::post('/admin', [$CTRL::class, '$ACTION']);
    - pattern: |
        if (Auth::check()) {
            User::where('id', $ID)->delete();
        }
    - pattern: |
        $ORDER = Order::findOrFail($request->input('order_id'));
    - pattern: |
        $USER = User::findOrFail($request->input('user_id'));
