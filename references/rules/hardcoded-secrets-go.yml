id: go-hardcoded-secrets
language: go
severity: error
message: '硬编码密钥（Go） (CWE-798)'
name: 硬编码密钥（Go）
description: Go项目中常见风险是将密钥声明为const或var，或在配置结构体中写死凭证。
cwe: CWE-798
remediation: '使用环境变量或密钥管理工具，不要将凭证写入源码：

  ```go

  // 不安全的代码 ❌

  const apiKey = "sk_test_1234567890abcdef"

  var dbPassword = "MyDbPass123!"

  // 安全的代码 ✅

  apiKey := os.Getenv("API_KEY")

  dbPassword := os.Getenv("DB_PASSWORD")

  // 推荐结合密钥管理系统进行统一轮换

  // AWS Secrets Manager、Vault 等

  ```

  '
rule:
  any:
  - all:
    - pattern: 'const $NAME = $VALUE

        '
      kind: const_declaration
    - regex: (?i)const\s+(api[_-]?key|secret[_-]?key|access[_-]?token|jwt[_-]?secret)\s*=\s*['"][A-Za-z0-9_\-\./+=]{12,}['"]
  - all:
    - pattern: 'var $NAME = $VALUE

        '
      kind: var_declaration
    - regex: (?i)var\s+(api[_-]?key|secret[_-]?key|access[_-]?token|jwt[_-]?secret)\s*=\s*['"][A-Za-z0-9_\-\./+=]{12,}['"]
  - all:
    - pattern: 'var $NAME = $VALUE

        '
      kind: var_declaration
    - regex: (?i)var\s+(password|pwd|passwd)\s*=\s*['"][^'"]{6,}['"]
  - all:
    - pattern: 'var $NAME = $VALUE

        '
      kind: var_declaration
    - regex: (?i)var\s+(db[_-]?(user|username|password|pass|pwd)|dsn|database[_-]?url|connection[_-]?string)\s*=\s*['"][^'"]{8,}['"]
  - all:
    - pattern: 'var $NAME = $VALUE

        '
      kind: var_declaration
    - regex: (?i)(postgres(ql)?|mysql|mongodb)(\+srv)?:\/\/
  - all:
    - pattern: 'var $NAME = $VALUE

        '
      kind: var_declaration
    - regex: (?i)['"]AKIA[0-9A-Z]{16}['"]
  - all:
    - pattern: 'var $NAME = $VALUE

        '
      kind: var_declaration
    - regex: (?i)['"](xox[baprs]-[A-Za-z0-9-]{10,}|ghp_[A-Za-z0-9]{20,}|sk_(live|test)_[A-Za-z0-9]{16,})['"]
  - all:
    - pattern: 'var $NAME = $VALUE

        '
      kind: var_declaration
    - regex: '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'
  - all:
    - pattern: '$NAME := $VALUE

        '
      kind: short_var_declaration
    - regex: (?i)(token|secret|key)\s*(:=|=)\s*['"][A-Za-z0-9+/=_\-]{24,}['"]
