id: python-xxe
language: python
name: XXE XML外部实体注入（Python）
message: 检测到XXE漏洞：使用不安全XML解析器处理不可信输入
description: |
  Python中多个XML解析库在处理不可信XML时可能受到XXE攻击。

  此规则重点覆盖以下风险场景：
  - xml.etree.ElementTree 直接解析外部输入
  - lxml.etree 启用实体解析（resolve_entities=True）
  - xml.dom.minidom 直接解析用户可控XML
  - lxml解析器允许网络或DTD加载

  风险：
  - 读取本地敏感文件
  - 发起SSRF请求探测内网
  - 通过实体膨胀导致拒绝服务
severity: error
risk_severity: 严重
cwe: CWE-611
remediation: |
  对不可信XML输入应使用安全解析配置，或改用defusedxml：

  ```python
  # 不安全的代码 ❌
  import xml.etree.ElementTree as ET
  root = ET.fromstring(user_xml)

  # 安全的代码 ✅
  from defusedxml import ElementTree as SafeET
  root = SafeET.fromstring(user_xml)

  # lxml安全配置示例
  from lxml import etree
  parser = etree.XMLParser(resolve_entities=False, no_network=True, load_dtd=False)
  root = etree.fromstring(user_xml, parser=parser)
  ```

  安全措施：
  - 优先使用defusedxml系列库
  - 禁用resolve_entities、load_dtd并启用no_network
  - 限制XML输入体积和嵌套深度
rule:
  any:
    - pattern: |
        ET.parse($XML_INPUT)
    - pattern: |
        ET.fromstring($XML_INPUT)
    - pattern: |
        xml.etree.ElementTree.parse($XML_INPUT)
    - pattern: |
        xml.etree.ElementTree.fromstring($XML_INPUT)
    - pattern: |
        minidom.parse($XML_INPUT)
    - pattern: |
        minidom.parseString($XML_INPUT)
    - pattern: |
        etree.fromstring($XML_INPUT)
    - pattern: |
        etree.parse($XML_INPUT)
    - pattern: |
        etree.XMLParser(resolve_entities=True)
    - pattern: |
        etree.XMLParser(load_dtd=True)
    - pattern: |
        etree.XMLParser(no_network=False)
