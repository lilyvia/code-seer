id: javascript-sql-injection
language: javascript
severity: error
message: 'SQL注入漏洞（JavaScript） (CWE-89)'
name: SQL注入（JavaScript）
description: Node.js 应用中 SQL 注入漏洞发生在使用字符串拼接动态构造 SQL 查询时，而不是使用参数化查询。
cwe: CWE-89
remediation: '使用参数化查询替代字符串拼接：

  ```javascript

  // 不安全的代码 ❌

  const query = `SELECT * FROM users WHERE id = ${userId}`;

  connection.query(query);

  const sql = "SELECT * FROM users WHERE id = " + userId;

  db.query(sql);

  // 安全的代码 ✅

  // MySQL - 使用参数占位符

  connection.query("SELECT * FROM users WHERE id = ?", [userId]);

  // PostgreSQL - 使用 $1 占位符

  db.query("SELECT * FROM users WHERE id = $1", [userId]);

  // Sequelize ORM (推荐)

  User.findByPk(userId);

  // Mongoose (MongoDB)

  User.findById(userId);

  ```

  '
rule:
  any:
  - kind: assignment_expression
    pattern: '$QUERY = `$SQL ${$VAR}$REST`'
  - kind: assignment_expression
    pattern: '$QUERY = "$SQL" + $VAR'
  - kind: call_expression
    pattern: '$CONN.query($SQL + $VAR)'
  - kind: call_expression
    pattern: '$CONN.query(`$SQL ${$VAR}`)'
  - kind: call_expression
    pattern: '$DB.query($SQL + $VAR)'
  - kind: call_expression
    pattern: '$DB.query(`$SQL ${$VAR}`)'
  - kind: call_expression
    pattern: '$CONN.query($QUERY)'
    regex: 'query\(query\)'
  - kind: call_expression
    pattern: '$DB.query($QUERY)'
    regex: 'query\(query\)'
  - kind: call_expression
    pattern: '$SEQUE.query(`$SQL${$VAR}`)'
  - kind: call_expression
    pattern: '$SEQUE.query($SQL + $VAR)'
  - kind: call_expression
    pattern: '$KNEX.raw(`$SQL${$VAR}`)'
  - kind: call_expression
    pattern: '$KNEX.raw($SQL + $VAR)'
  - kind: call_expression
    pattern: '$PRISMA.$queryRawUnsafe($QUERY)'
    regex: 'queryRawUnsafe\(sql\)'
  - kind: call_expression
    pattern: '$PRISMA.$queryRawUnsafe($SQL + $VAR)'
  - kind: call_expression
    pattern: '$PRISMA.$executeRawUnsafe(`$SQL${$VAR}`)'
  - kind: call_expression
    pattern: '$PRISMA.$executeRawUnsafe($SQL + $VAR)'
  # Sequelize raw query replacements
  - kind: call_expression
    pattern: '$SEQUE.query($QUERY, { replacements: { $KEY: $VAL } })'
    regex: 'query\(sql'
  - kind: call_expression
    pattern: '$SEQUE.query($QUERY, { bind: { $KEY: $VAL } })'
    regex: 'query\(sql'
  - kind: call_expression
    pattern: '$MODEL.sequelize.query($QUERY)'
    regex: 'query\(sql'
  # Knex raw helpers variants
  - kind: call_expression
    pattern: '$KNEX.raw($QUERY)'
    regex: 'raw\(sql\)'
  - kind: call_expression
    pattern: '$DB.raw(`$SQL${$VAR}`)'
  - kind: call_expression
    pattern: '$DB.raw($SQL + $VAR)'
  # Prisma unsafe raw helpers variants
  - kind: call_expression
    pattern: '$PRISMA.$queryRawUnsafe(`$SQL${$VAR}`)'
  - kind: call_expression
    pattern: '$PRISMA.$executeRawUnsafe($QUERY)'
    regex: 'executeRawUnsafe\(sql\)'
