id: rust-nosql-injection
language: rust
severity: error
message: 'NoSQL 注入漏洞（Rust） (CWE-943)'
name: NoSQL 注入（Rust）
description: |
  在 Rust + MongoDB (mongodb crate) 场景中，将用户输入直接放入 `$where` 表达式，
  或直接把动态构造的过滤对象传给查询接口，可能导致 NoSQL 注入或绕过预期查询约束。
cwe: CWE-943
remediation: |
  避免直接把用户输入拼入 `$where` 或动态 filter object，优先使用固定字段、允许名单与显式类型转换：
  ```rust
  // 不安全的代码 ❌
  collection.find(doc! { "$where": user_input }).await;
  
  let mut filter = doc! {};
  filter.insert(req.query.field, req.query.value);
  collection.find(filter).await;
  
  // 安全的代码 ✅
  let allowed_fields: HashSet<&str> = ["email", "status"].iter().cloned().collect();
  let field = &req.query.field;
  if !allowed_fields.contains(field) {
      return Err("invalid field".into());
  }
  
  collection.find(doc! { field: req.query.value.to_string() }).await;
  collection.find(doc! { "email": req.query.email.to_string() }).await;
  ```
rule:
  any:
    # $where 表达式注入
    - kind: call_expression
      pattern: '$COLL.find(doc! { "$where": $EXPR })'
    - kind: call_expression
      pattern: '$COLL.find_one(doc! { "$where": $EXPR })'
    - kind: call_expression
      pattern: '$COLL.count_documents(doc! { "$where": $EXPR })'
    # 字符串拼接构造 $where
    - kind: call_expression
      pattern: '$COLL.find(doc! { "$where": $SQL + $VAR })'
    - kind: call_expression
      pattern: '$COLL.find(doc! { "$where": format!($FMT, $$$ARGS) })'
    # Document 动态 insert（来自外部输入）
    - kind: call_expression
      pattern: '$FILTER.insert($REQ.query.$FIELD, $REQ.query.$VALUE)'
    - kind: call_expression
      pattern: '$FILTER.insert($REQ.query.$FIELD, $VALUE)'
    # 从 JSON 解析为查询对象
    - kind: call_expression
      pattern: '$COLL.find(serde_json::from_str($JSON).unwrap())'
    - kind: call_expression
      pattern: '$COLL.find_one(serde_json::from_str($JSON).unwrap())'
