id: java-auth-defects
language: java
name: 鉴权缺陷（Java）
message: 检测到鉴权缺陷：Spring接口缺少认证或授权控制
description: |
  Java/Spring 项目中的鉴权缺陷通常出现在Controller层。

  此规则检测到以下问题：
  - 未授权访问: 管理接口缺少 @PreAuthorize / @Secured
  - 垂直越权: 仅要求已登录，未限制管理员角色
  - 水平越权: 直接使用路径参数ID查询并返回他人资源
severity: error
risk_level: 高危
cwe: CWE-287
remediation: |
  在敏感接口增加细粒度授权，避免仅依赖登录态：

  ```java
  @RestController
  @RequestMapping("/admin")
  public class AdminController {

      @PreAuthorize("hasRole('ADMIN')")
      @DeleteMapping("/users/{id}")
      public void deleteUser(@PathVariable Long id) {
          userService.deleteUser(id);
      }
  }

  @GetMapping("/orders/{id}")
  public Order getOrder(@PathVariable Long id, Authentication auth) {
      Order order = orderService.getById(id);
      if (!order.getUserId().equals(auth.getName())) {
          throw new AccessDeniedException("禁止访问他人订单");
      }
      return order;
  }
  ```

  建议：
  - 管理操作使用 @PreAuthorize("hasRole('ADMIN')")
  - 普通查询校验资源归属关系
  - 在Service层保留二次权限校验，避免绕过Controller
rule:
  any:
    - pattern: |
        @GetMapping("/admin")
        public $RET $FUNC($$$) {
            $$$BODY
        }
    - pattern: |
        @PostMapping("/admin/$$$PATH")
        public $RET $FUNC($$$) {
            $$$BODY
        }
    - pattern: |
        @PreAuthorize("isAuthenticated()")
        @DeleteMapping($PATH)
        public $RET $FUNC($$$) {
            $$$BODY
        }
    - pattern: |
        @GetMapping("/users/{id}")
        public $RET $FUNC(@PathVariable Long id) {
            return $REPO.findById(id).orElseThrow();
        }
