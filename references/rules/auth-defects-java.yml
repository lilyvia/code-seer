id: auth-defects-java
language: java
severity: warning
message: '鉴权缺陷（Java） (CWE-287)'
name: 鉴权缺陷（Java）
description: Java/Spring 项目中的鉴权缺陷通常出现在Controller层。
cwe: CWE-287
remediation: |
  在敏感接口增加细粒度授权，避免仅依赖登录态：
  ```java
  @RestController
  @RequestMapping("/admin")
  public class AdminController {
      @PreAuthorize("hasRole('ADMIN')")
      @DeleteMapping("/users/{id}")
      public void deleteUser(@PathVariable Long id) {
          userService.deleteUser(id);
      }
  }
  @GetMapping("/orders/{id}")
  public Order getOrder(@PathVariable Long id, Authentication auth) {
      Order order = orderService.getById(id);
      if (!order.getUserId().equals(auth.getName())) {
          throw new AccessDeniedException("禁止访问他人订单");
      }
      return order;
  }
  ```
  建议：
  - 管理操作使用 @PreAuthorize("hasRole('ADMIN')")
  - 普通查询校验资源归属关系
  - 在Service层保留二次权限校验，避免绕过Controller
rule:
  kind: method_declaration
  any:
    # Pattern 1: IDOR - Direct object return without ownership check
    - pattern: |
        @GetMapping($PATH)
        public $RET $METHOD($$$PARAMS) {
          return $REPO.findById($ID).orElseThrow();
        }

    # Pattern 2: Delete operation guarded only by isAuthenticated
    - pattern: |
        @PreAuthorize("isAuthenticated()")
        @DeleteMapping($PATH)
        public $RET $METHOD($$$PARAMS) {
          $$$BODY
        }

    # Pattern 3: Sensitive write operations (Delete/Put) without any security annotation
    - pattern: |
        @DeleteMapping($PATH)
        public $RET $METHOD($$$PARAMS) {
          $$$BODY
        }
      not:
        follows:
          pattern: '@PreAuthorize($$$_)'
          stopBy: end
    - pattern: |
        @PutMapping($PATH)
        public $RET $METHOD($$$PARAMS) {
          $$$BODY
        }
      not:
        follows:
          pattern: '@PreAuthorize($$$_)'
          stopBy: end

    # Pattern 4: Direct findById return from request param
    - pattern: |
        @GetMapping($PATH)
        public $RET $METHOD($$$PARAMS) {
          return $REPO.findById($REQUEST.getParameter($PARAM));
        }
