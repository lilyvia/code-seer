id: auth-defects-javascript
language: javascript
severity: warning
message: '鉴权缺陷（JavaScript） (CWE-287)'
name: 鉴权缺陷（JavaScript）
description: |
  Node.js / Express 等框架中，敏感路由缺少身份验证或授权校验，
  可能导致未授权访问。
cwe: CWE-287
remediation: |
  对敏感路由实施认证和授权中间件：
  ```javascript
  // 不安全的代码 ❌
  app.get('/admin', (req, res) => {
    res.render('admin');
  });

  // 安全的代码 ✅
  const { isAuthenticated, hasRole } = require('./auth');

  app.get('/admin', isAuthenticated, hasRole('admin'), (req, res) => {
    res.render('admin');
  });

  // 资源归属校验
  app.get('/orders/:id', isAuthenticated, async (req, res) => {
    const order = await Order.findById(req.params.id);
    if (order.userId !== req.user.id) {
      return res.status(403).send('禁止访问');
    }
    res.json(order);
  });
  ```
rule:
  any:
    # === Mongoose/MongoDB Patterns ===
    - pattern: 'await $MODEL.findById(req.params.$KEY)'
    - pattern: 'await $MODEL.findOne({ _id: req.body.$KEY })'
    - pattern: 'await $MODEL.findByIdAndDelete(req.params.$KEY)'
    - pattern: 'await $MODEL.findByIdAndUpdate(req.params.$KEY, $$$)'
    - pattern: 'res.json(await $MODEL.findById($$$))'
    - pattern: 'res.send(await $MODEL.findById($$$))'
    - pattern: 'res.json(await $MODEL.findOne($$$))'
    - pattern: 'res.send(await $MODEL.findOne($$$))'
    # Express delete route without guard middleware
    - pattern: 'app.delete($PATH, $HANDLER)'
      regex: 'findByIdAndDelete|deleteOne|remove|destroy'
    # Express put route without guard middleware
    - pattern: 'app.put($PATH, $HANDLER)'
      regex: 'findByIdAndUpdate|updateOne|save'
    # Fastify direct resource exposure via reply.send
    - pattern: 'reply.send(await $MODEL.findById($$$))'
    - pattern: 'reply.send(await $MODEL.findOne($$$))'
    # NestJS / Koa direct resource exposure via ctx.body
    - pattern: 'ctx.body = await $MODEL.findById($$$)'
    - pattern: 'ctx.body = await $MODEL.findOne($$$)'

    # === Express Route Handler Patterns (Direct Resource Exposure) ===
    # Direct return of sensitive data in GET route
    - pattern: |
        app.get($PATH, async (req, res) => {
          $$$
          res.json(await $MODEL.findById(req.params.$ID))
        })
    - pattern: |
        app.get($PATH, async (req, res) => {
          $$$
          res.json(await $MODEL.findOne($$$))
        })
    - pattern: |
        app.get($PATH, async (req, res) => {
          $$$
          res.send(await $MODEL.findById(req.params.$ID))
        })
    # Direct modification in POST/PUT route
    - pattern: |
        app.post($PATH, async (req, res) => {
          $$$
          await $MODEL.create(req.body)
          $$$
        })
    - pattern: |
        app.put($PATH, async (req, res) => {
          $$$
          await $MODEL.findByIdAndUpdate(req.params.$ID, req.body)
          $$$
        })
    - pattern: |
        app.put($PATH, async (req, res) => {
          $$$
          await $MODEL.updateOne({ _id: req.params.$ID }, req.body)
          $$$
        })
    # Direct deletion in DELETE route
    - pattern: |
        app.delete($PATH, async (req, res) => {
          $$$
          await $MODEL.findByIdAndDelete(req.params.$ID)
          $$$
        })
    - pattern: |
        app.delete($PATH, async (req, res) => {
          $$$
          await $MODEL.deleteOne({ _id: req.params.$ID })
          $$$
        })
    - pattern: |
        app.delete($PATH, async (req, res) => {
          $$$
          await $MODEL.findOneAndDelete({ _id: req.params.$ID })
          $$$
        })

    # === Fastify Route Handler Patterns ===
    # Direct resource exposure
    - pattern: |
        fastify.get($PATH, async (req, reply) => {
          $$$
          reply.send(await $MODEL.findById(req.params.$ID))
        })
    - pattern: |
        fastify.get($PATH, async (req, reply) => {
          $$$
          reply.send(await $MODEL.findOne($$$))
        })
    # Direct modification
    - pattern: |
        fastify.post($PATH, async (req, reply) => {
          $$$
          await $MODEL.create(req.body)
          $$$
        })
    - pattern: |
        fastify.put($PATH, async (req, reply) => {
          $$$
          await $MODEL.findByIdAndUpdate(req.params.$ID, req.body)
          $$$
        })
    # Direct deletion
    - pattern: |
        fastify.delete($PATH, async (req, reply) => {
          $$$
          await $MODEL.findByIdAndDelete(req.params.$ID)
          $$$
        })

    # === NestJS Controller Patterns ===
    # Match method definitions inside NestJS controllers that return direct DB results
    - pattern: 'return await this.$SERVICE.findById($PARAMS.$ID)'
      regex: '@Param'
    - pattern: 'return await this.$SERVICE.findById($VAR)'
      regex: '@Param'
    - pattern: 'return await this.$SERVICE.create($BODY)'
      regex: '@Body'
    - pattern: 'return await this.$REPO.findOne($$$)'
      regex: '@Param'

    # === Router Instance Patterns (express.Router()) ===
    - pattern: |
        router.get($PATH, async (req, res) => {
          $$$
          res.json(await $MODEL.findById(req.params.$ID))
        })
    - pattern: |
        router.post($PATH, async (req, res) => {
          $$$
          await $MODEL.create(req.body)
          $$$
        })
    - pattern: |
        router.put($PATH, async (req, res) => {
          $$$
          await $MODEL.findByIdAndUpdate(req.params.$ID, req.body)
          $$$
        })
    - pattern: |
        router.delete($PATH, async (req, res) => {
          $$$
          await $MODEL.findByIdAndDelete(req.params.$ID)
          $$$
        })

    # === Generic Handler Patterns ===
    # Any async function that directly returns DB query result from params
    - pattern: |
        async function $NAME(req, res) {
          $$$
          res.json(await $MODEL.findById(req.params.$ID))
        }
    - pattern: |
        async function $NAME(req, res) {
          $$$
          res.json(await $MODEL.findOne({ _id: req.body.$ID }))
        }
    - pattern: |
        async function $NAME(req, res) {
          $$$
          await $MODEL.findByIdAndDelete(req.params.$ID)
          $$$
        }

    # === Prisma ORM Patterns ===
    - pattern: 'await prisma.$MODEL.findUnique({ where: { id: req.params.$ID } })'
    - pattern: 'await prisma.$MODEL.findFirst({ where: { id: req.params.$ID } })'
    - pattern: 'await prisma.$MODEL.update({ where: { id: req.params.$ID }, data: req.body })'
    - pattern: 'await prisma.$MODEL.delete({ where: { id: req.params.$ID } })'
    - pattern: 'await prisma.$MODEL.create({ data: req.body })'

    # false-negative coverage expansion
    - pattern: 'app.patch($PATH, $HANDLER)'
      regex: 'findById|findOne|update|delete|remove|destroy|prisma'
    - pattern: 'router.patch($PATH, $HANDLER)'
      regex: 'findById|findOne|update|delete|remove|destroy|prisma'
    - pattern: 'server.route({ method: $METHOD, path: $PATH, handler: $HANDLER })'
      regex: 'findById|findOne|update|delete|remove|destroy|prisma'
