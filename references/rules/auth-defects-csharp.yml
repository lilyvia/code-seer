id: csharp-auth-defects
language: csharp
name: 鉴权缺陷（C#）
description: ASP.NET 鉴权缺陷常发生在缺少身份验证或授权校验的 API 端点。
cwe: CWE-287
remediation: |
  对敏感控制器和动作方法增加认证与授权策略：
  ```csharp
  [ApiController]
  [Route("admin")]
  public class AdminController : ControllerBase
  {
      [Authorize(Roles = "Admin")]
      [HttpDelete("users/{id}")]
      public IActionResult DeleteUser(int id)
      {
          _service.DeleteUser(id);
          return NoContent();
      }
  }
  [Authorize]
  [HttpGet("orders/{id}")]
  public IActionResult GetOrder(int id)
  {
      var order = _context.Orders.Find(id);
      if (order == null || order.UserId != User.Identity!.Name) {
          return Forbid();
      }
      return Ok(order);
  }
  ```
  建议：
  - 管理操作统一使用 Roles 或 Policy
  - 查询接口必须验证资源归属
  - 服务层保留权限校验，防止API层绕过
rule:
  any:
    - pattern: |
        app.MapGet("/admin", $HANDLER);
    - pattern: |
        app.MapPost("/admin", $HANDLER);
    - pattern: |
        if (User.Identity != null && User.Identity.IsAuthenticated) {
            _context.Users.Remove($TARGET);
        }
    - pattern: |
        return Ok(_context.Users.Find(id));
