id: xss-javascript
language: javascript
severity: warning
message: 'XSS跨站脚本攻击（JavaScript） (CWE-79)'
name: XSS跨站脚本攻击（JavaScript）
description: XSS（跨站脚本攻击）允许攻击者在用户浏览器中执行恶意脚本。
cwe: CWE-79
remediation: "对用户输入进行HTML转义后再输出：\n```javascript\n// 不安全的代码 ❌\nelement.innerHTML = userInput;\ndocument.write(userInput);\n\
  eval(userCode);\n// 安全的代码 ✅\n// 使用textContent代替innerHTML\nelement.textContent = userInput;\n// 或者进行HTML转义\n\
  function escapeHtml(text) {\n  const div = document.createElement('div');\n  div.textContent = text;\n\
  \  return div.innerHTML;\n}\nelement.innerHTML = escapeHtml(userInput);\n// React中使用JSX自动转义\n<div>{userInput}</div>\n\
  // 如果必须使用dangerouslySetInnerHTML，确保内容已净化\n<div dangerouslySetInnerHTML={{__html: DOMPurify.sanitize(userInput)}}\
  \ />\n```\n推荐措施：\n- 使用DOMPurify等库净化HTML\n- 使用CSP（内容安全策略）\n- 避免使用eval和document.write\n"
rule:
  any:
  - pattern: '$ELEMENT.innerHTML = $USER_INPUT

      '
  - pattern: '$ELEMENT.outerHTML = $USER_INPUT

      '
  - pattern: '$ELEMENT.insertAdjacentHTML($POS, $USER_INPUT)

      '
  - pattern: 'document.write($USER_INPUT)

      '
  - pattern: 'document.writeln($USER_INPUT)

      '
  - pattern: '<div dangerouslySetInnerHTML={{__html: $USER_INPUT}} />

      '
  - pattern: 'eval($USER_INPUT)

      '
  - pattern: 'setTimeout($USER_INPUT, $DELAY)

      '
  - pattern: 'setInterval($USER_INPUT, $DELAY)

      '
  - pattern: 'new Function($USER_INPUT)

      '
  - pattern: 'ref.current.innerHTML = $USER_INPUT

      '
  - pattern: 'window.postMessage($USER_INPUT, "*")

      '
  - pattern: "window.postMessage($USER_INPUT, '*')\n\n      "
  - pattern: 'postMessage($USER_INPUT, "*")

      '
  - pattern: "postMessage($USER_INPUT, '*')\n\n      "
  - pattern: '<div v-html="$USER_INPUT">

      '
  - pattern: '$ELEMENT.html($USER_INPUT)

      '

  # false-negative coverage expansion
  - pattern: '$ELEMENT.outerHTML = $USER_INPUT'
  - pattern: '$ELEMENT.setAttribute("href", $USER_INPUT)'
  - pattern: '$SCE.trustAsHtml($USER_INPUT)'
  - pattern: 'React.createElement($TAG, { dangerouslySetInnerHTML: { __html: $USER_INPUT } })'
  - kind: program
    regex: 'x-html=.*(user|input|param|request|query|body|payload)'
  - pattern: '$SCE.bypassSecurityTrustHtml($USER_INPUT)'
  - pattern: '$SCE.bypassSecurityTrustScript($USER_INPUT)'
  - pattern: '$SCE.bypassSecurityTrustStyle($USER_INPUT)'
  - pattern: '$SCE.bypassSecurityTrustUrl($USER_INPUT)'
  - pattern: '$ELEMENT.append($USER_INPUT)'
  - pattern: '$ELEMENT.prepend($USER_INPUT)'
  - pattern: '$(...).append($USER_INPUT)'
  - pattern: '$(...).prepend($USER_INPUT)'
  - kind: program
    regex: '\{@html\s+.*(user|input|param|request|query|body|payload)'
  - pattern: 'unsafeHTML($USER_INPUT)'
  - pattern: 'React.createElement($TAG, { $$$, dangerouslySetInnerHTML: { __html: $USER_INPUT } })'
