id: command-exec-java
language: java
severity: error
message: '命令执行漏洞（Java） (CWE-78)'
name: 命令执行漏洞（Java）
description: Java 中的命令执行风险通常来自 Runtime.exec 和 ProcessBuilder，若直接拼接用户输入将允许任意命令执行。
cwe: CWE-78
remediation: "避免将外部输入直接传入命令执行 API，优先用业务 API 替代系统命令。\n```java\n// 不安全的代码 ❌\nRuntime.getRuntime().exec(userCmd);\n\
  new ProcessBuilder(\"sh\", \"-c\", userCmd).start();\n// 更安全的代码 ✅\nList<String> allowed = Arrays.asList(\"\
  date\", \"uptime\");\nif (allowed.contains(userCmd)) {\n    ProcessBuilder pb = new ProcessBuilder(userCmd);\n\
  \    pb.redirectErrorStream(true);\n    Process p = pb.start();\n}\n```\n"
rule:
  kind: method_invocation
  any:
  - pattern: Runtime.getRuntime().exec($CMD)
    kind: method_invocation
  - pattern: $RUNTIME.exec($CMD)
    kind: method_invocation
    regex: Runtime\s*\.\s*getRuntime\s*\(\s*\)\s*\.\s*exec
  - pattern: new ProcessBuilder($$$ARGS).start()
    kind: method_invocation
  - pattern: new ProcessBuilder().command($$$ARGS).start()
    kind: method_invocation
  - pattern: new ProcessBuilder().command("sh", "-c", $CMD).start()
    kind: method_invocation
  - pattern: new ProcessBuilder().command("cmd", "/c", $CMD).start()
    kind: method_invocation
  - pattern: new ProcessBuilder("sh", "-c", $CMD).start()
    kind: method_invocation
  - pattern: new ProcessBuilder("cmd", "/c", $CMD).start()
    kind: method_invocation
  - pattern: $PB.command($$$ARGS).start()
    kind: method_invocation
  - pattern: $PB.command("sh", "-c", $CMD).start()
    kind: method_invocation
  - pattern: $PB.command("cmd", "/c", $CMD).start()
    kind: method_invocation
  - pattern: $PB.start()
    kind: method_invocation
    regex: ProcessBuilder

  # false-negative coverage expansion - additional command execution sinks
  - kind: method_invocation
    pattern: '$ENGINE.eval($CODE)'
    regex: '(?i)(ScriptEngine|Nashorn|nashorn|bsh\.|GroovyShell|groovy)'
  - kind: method_invocation
    pattern: 'new ScriptEngineManager().getEngineByName($NAME).eval($CODE)'
  - kind: method_invocation
    pattern: 'new Interpreter().eval($CODE)'
  - kind: method_invocation
    pattern: 'new bsh.Interpreter().eval($CODE)'
  - kind: method_invocation
    pattern: 'new GroovyShell().evaluate($CODE)'
  - kind: method_invocation
    pattern: 'Ognl.getValue($EXPR, $CONTEXT, $ROOT)'
  - kind: method_invocation
    pattern: 'Ognl.setValue($EXPR, $CONTEXT, $ROOT, $VALUE)'
