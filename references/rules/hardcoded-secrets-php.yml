id: php-hardcoded-secrets
language: php
severity: error
message: '硬编码密钥（PHP） (CWE-798)'
name: 硬编码密钥（PHP）
description: PHP应用经常在配置文件或控制器中直接写入凭证，这会让代码泄露直接变成数据泄露。
cwe: CWE-798
remediation: |
  凭证应从环境变量或安全配置服务读取：
  ```php
  // 不安全的代码 ❌
  $apiKey = "ghp_1234567890abcdefghijklmnopqrst";
  $password = "SuperSecret123";
  // 安全的代码 ✅
  $apiKey = getenv("API_KEY");
  $password = getenv("DB_PASSWORD");
  // 推荐使用集中式密钥管理并定期轮换
  ```
rule:
  all:
    - kind: assignment_expression
    - regex: "(?i)(\\$(api[_-]?key|secret[_-]?key|access[_-]?token|jwt[_-]?secret|password|pwd|passwd|db[_-]?(user|username|password|pass|pwd)|dsn|database[_-]?url|connection[_-]?string)\\s*=\\s*['\"][^'\"]{6,}['\"]|AKIA[0-9A-Z]{16}|xox[baprs]-[A-Za-z0-9-]{10,}|ghp_[A-Za-z0-9]{20,}|sk_(live|test)_[A-Za-z0-9]{16,}|-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----|(mysql|mysqli|pgsql|postgres(ql)?|mongodb)(\\+srv)?:\\/\\/|['\"][A-Za-z0-9+/=_\\-]{24,}['\"])"
