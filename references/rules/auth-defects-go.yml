id: auth-defects-go
language: go
severity: warning
message: '鉴权缺陷（Go） (CWE-287)'
name: 鉴权缺陷（Go）
description: Go Web 服务常通过路由和中间件控制访问权限。
cwe: CWE-287
remediation: |
  对路由与处理函数同时加强鉴权：
  ```go
  // Gin 路由示例
  admin := r.Group("/admin")
  admin.Use(AuthMiddleware(), RequireRole("admin"))
  admin.DELETE("/users/:id", deleteUser)
  func getOrder(c *gin.Context) {
      orderID := c.Param("id")
      order := repo.GetOrderByID(orderID)
      uid := c.GetString("user_id")
      if order.UserID != uid {
          c.AbortWithStatus(http.StatusForbidden)
          return
      }
      c.JSON(http.StatusOK, order)
  }
  ```
  建议：
  - 敏感路由必须绑定认证+角色中间件
  - 所有按ID读取的业务都校验资源归属
  - 关键操作在Service层进行二次权限校验
rule:
  any:
    - pattern: |
        $VAR, $ERR := $REPO.$METHOD($REQ.URL.Query().Get($KEY))
    - pattern: |
        $VAR, $ERR := $DB.$METHOD($CTX.Param($KEY))
    - pattern: |
        if $USERID != "" {
            $REPO.DeleteUser($TARGET)
        }
    - pattern: |
        $RESULT := $DB.First($$$, $CTX.Query($KEY))
    - pattern: |
        $DB.Where($$$, $CTX.Param($KEY)).$METHOD($$$)
    - pattern: |
        $CTX.JSON($CODE, $DB.Find($CTX.Param($KEY)))
