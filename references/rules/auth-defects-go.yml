id: go-auth-defects
language: go
name: 鉴权缺陷（Go）
description: Go Web 服务常通过路由和中间件控制访问权限。
cwe: CWE-287
remediation: |
  对路由与处理函数同时加强鉴权：
  ```go
  // Gin 路由示例
  admin := r.Group("/admin")
  admin.Use(AuthMiddleware(), RequireRole("admin"))
  admin.DELETE("/users/:id", deleteUser)
  func getOrder(c *gin.Context) {
      orderID := c.Param("id")
      order := repo.GetOrderByID(orderID)
      uid := c.GetString("user_id")
      if order.UserID != uid {
          c.AbortWithStatus(http.StatusForbidden)
          return
      }
      c.JSON(http.StatusOK, order)
  }
  ```
  建议：
  - 敏感路由必须绑定认证+角色中间件
  - 所有按ID读取的业务都校验资源归属
  - 关键操作在Service层进行二次权限校验
rule:
  kind: call_expression
  any:
    - pattern: |
        r.GET("/admin", $HANDLER)
    - pattern: |
        r.POST("/admin/$$$PATH", $HANDLER)
    - pattern: |
        http.HandleFunc("/admin", $HANDLER)
    - pattern: |
        if userID != "" {
            repo.DeleteUser($TARGET)
        }
    - pattern: |
        order, _ := repo.GetOrderByID(r.URL.Query().Get("order_id"))
