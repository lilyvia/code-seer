id: command-exec-php
language: php
severity: error
message: '命令执行漏洞（PHP） (CWE-78)'
name: 命令执行漏洞（PHP）
description: PHP 提供了多个可直接调用系统命令的函数，若参数可控将导致命令注入。
cwe: CWE-78
remediation: "尽量避免使用命令执行函数；必须使用时采用白名单并严格约束参数。\n```php\n<?php\n// 不安全的代码 ❌\nsystem($userCmd);\necho shell_exec($userInput);\n\
  // 更安全的代码 ✅\n$allowed = ['whoami', 'date'];\nif (in_array($userCmd, $allowed, true)) {\n    $output\
  \ = shell_exec($userCmd);\n    echo htmlspecialchars((string)$output, ENT_QUOTES, 'UTF-8');\n}\n?>\n\
  ```\n"
rule:
  kind: function_call_expression
  any:
  - pattern: exec($CMD)
  - pattern: system($CMD)
  - pattern: shell_exec($CMD)
  - pattern: passthru($CMD)

  # false-negative coverage expansion
  - pattern: 'proc_open($CMD, $$$)'
  - pattern: 'popen($CMD, $MODE)'
  - pattern: 'pcntl_exec($CMD, $$$)'
  - kind: expression_statement
    regex: '`[^`]+`'
