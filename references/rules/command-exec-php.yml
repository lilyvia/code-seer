id: php-command-exec
language: php
name: 命令执行漏洞（PHP）
description: PHP 提供了多个可直接调用系统命令的函数，若参数可控将导致命令注入。
cwe: CWE-78
remediation: |
  尽量避免使用命令执行函数；必须使用时采用白名单并严格约束参数。
  ```php
  <?php
  // 不安全的代码 ❌
  system($userCmd);
  echo shell_exec($userInput);
  // 更安全的代码 ✅
  $allowed = ['whoami', 'date'];
  if (in_array($userCmd, $allowed, true)) {
      $output = shell_exec($userCmd);
      echo htmlspecialchars((string)$output, ENT_QUOTES, 'UTF-8');
  }
  ?>
  ```
rule:
  any:
    - pattern: exec($CMD)
    - pattern: system($CMD)
    - pattern: shell_exec($CMD)
    - pattern: passthru($CMD)
