id: sql-injection-csharp
language: csharp
severity: error
message: 'SQL注入（C#） (CWE-89)'
name: SQL注入（C#）
description: C#中若通过字符串插值、String.Format 或字符串拼接构建 SQL 语句，攻击者可注入恶意 SQL 代码。
cwe: CWE-89
remediation: '使用参数化查询并显式绑定参数：

  ```csharp

  // 不安全的代码 ❌

  command.CommandText = $"SELECT * FROM Users WHERE Id = {userId}";

  command.CommandText = "SELECT * FROM Users WHERE Id = " + userId;

  // 安全的代码 ✅

  command.CommandText = "SELECT * FROM Users WHERE Id = @id";

  command.Parameters.AddWithValue("@id", userId);

  ```

  '
rule:
  any:
  - all:
    - kind: assignment_expression
      pattern: '$CMD.CommandText = $SQL'
    - regex: CommandText\s*=\s*\$".*(SELECT|INSERT|UPDATE|DELETE).*
  - kind: assignment_expression
    pattern: '$CMD.CommandText = string.Format($FMT, $$$ARGS)'
  - kind: assignment_expression
    pattern: '$CMD.CommandText = $SQL + $VAR'
  - all:
    - kind: object_creation_expression
      pattern: 'new SqlCommand($SQL, $CONN)'
    - regex: SqlCommand\(\$".*(SELECT|INSERT|UPDATE|DELETE).*
