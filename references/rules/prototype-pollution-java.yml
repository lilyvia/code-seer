id: prototype-pollution-java
language: java
severity: warning
message: '对象属性注入风险（Java） (CWE-915)'
name: 对象属性注入风险（Java）
description: |
  Java中若将用户输入直接用于反射设置字段或方法调用，
  攻击者可能通过注入危险属性名或方法名操纵对象行为或执行任意代码。
cwe: CWE-915
remediation: |
  对反射操作的字段名和方法名做允许名单校验，避免直接使用用户输入：
  ```java
  // 不安全的代码 ❌
  Field field = obj.getClass().getDeclaredField(userFieldName);
  field.set(obj, userValue);
  Method method = obj.getClass().getMethod(userMethodName);
  method.invoke(obj);
  
  // 安全的代码 ✅
  Set<String> allowedFields = Set.of("name", "email", "age");
  if (allowedFields.contains(fieldName)) {
      Field field = obj.getClass().getDeclaredField(fieldName);
      field.set(obj, value);
  }
  ```
rule:
  kind: method_invocation
  any:
  - pattern: '$CLS.getDeclaredField($NAME).set($OBJ, $VAL)'
  - pattern: '$CLS.getField($NAME).set($OBJ, $VAL)'
  - pattern: '$CLS.getDeclaredMethod($NAME).invoke($OBJ, $$$ARGS)'
  - pattern: '$CLS.getMethod($NAME).invoke($OBJ, $$$ARGS)'
  - pattern: '$OBJ.getClass().getDeclaredField($NAME).set($TARGET, $VAL)'
  - pattern: '$OBJ.getClass().getMethod($NAME).invoke($TARGET, $$$ARGS)'
