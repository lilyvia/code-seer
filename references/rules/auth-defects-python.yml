id: python-auth-defects
language: python
severity: warning
message: '鉴权缺陷（Python） (CWE-287)'
name: 鉴权缺陷（Python）
description: 鉴权缺陷允许未授权用户访问敏感资源或执行特权操作。
cwe: CWE-287
remediation: |
  实施适当的身份验证和授权：
  ```python
  # Flask示例
  from flask_login import login_required, current_user
  from flask import abort
  @app.route('/admin')
  @login_required
  def admin():
      if not current_user.is_admin:
          abort(403)
      return render_template('admin.html')
  # Django示例
  from django.contrib.auth.decorators import login_required, permission_required
  @login_required
  @permission_required('user.can_view_admin')
  def admin_view(request):
      pass
  # 水平越权防护
  def view_order(request, order_id):
      order = get_object_or_404(Order, id=order_id)
      if order.user_id != request.user.id:
          raise PermissionDenied()
      return render(request, 'order.html', {'order': order})
  ```
rule:
  any:
    - pattern: $VAR = $MODEL.objects.get($$$ARGS)
      regex: request|args|kwargs|GET|POST|input
    - pattern: $VAR = $MODEL.query.get($$$ARGS)
      regex: request|args|kwargs|GET|POST|input
    - pattern: $VAR = db.session.query($MODEL).get($$$ARGS)
      regex: request|args|kwargs|GET|POST|input
    - pattern: $VAR = $MODEL.objects.filter($$$ARGS).first()
      regex: request|args|kwargs|GET|POST|input
    - pattern: $VAR = $MODEL.query.filter_by($$$ARGS).first()
      regex: request|args|kwargs|GET|POST|input
    - pattern: $MODEL.objects.filter($$$ARGS).delete()
      regex: request|args|kwargs|GET|POST|input
    - pattern: $MODEL.query.filter_by($$$ARGS).delete()
      regex: request|args|kwargs|GET|POST|input
