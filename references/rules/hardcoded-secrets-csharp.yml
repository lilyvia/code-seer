id: csharp-hardcoded-secrets
language: csharp
name: 硬编码密钥（C#）
message: 检测到C#代码中的硬编码凭证：密钥、密码或连接字符串
description: |
  在C#/.NET项目中，若将密钥写入字符串字面量、配置对象或常量字段，
  一旦代码仓库泄露，攻击者可直接复用凭证访问外部系统。

  此规则检测到：
  - API Key / Secret / Token 的硬编码赋值
  - Password、Pwd、Passwd 等明文密码
  - 数据库连接字符串与认证信息
  - JWT Secret
  - 私钥标记和高熵随机字符串
severity: error
risk_severity: 高危
cwe: CWE-798
remediation: |
  使用环境变量、用户机密或密钥托管服务，不要在源码中写入凭证：

  ```csharp
  // 不安全的代码 ❌
  string apiKey = "xoxb-123456789012-abcdefghijklmnop";
  string password = "MyPlainPassword";

  // 安全的代码 ✅
  string apiKey = Environment.GetEnvironmentVariable("API_KEY");
  string password = Environment.GetEnvironmentVariable("DB_PASSWORD");

  // 建议结合 Secret Manager / Key Vault
  ```
rule:
  any:
    - all:
        - pattern: |
            string $NAME = $VALUE;
        - regex: "(?i)string\\s+(api[_-]?key|secret[_-]?key|access[_-]?token|jwt[_-]?secret)\\s*=\\s*['\"][A-Za-z0-9_\\-\\./+=]{12,}['\"]"
    - all:
        - pattern: |
            string $NAME = $VALUE;
        - regex: "(?i)string\\s+(password|pwd|passwd)\\s*=\\s*['\"][^'\"]{6,}['\"]"
    - all:
        - pattern: |
            string $NAME = $VALUE;
        - regex: "(?i)string\\s+(db[_-]?(user|username|password|pass|pwd)|database[_-]?url|connection[_-]?string|conn(str|ectionString)?)\\s*=\\s*['\"][^'\"]{8,}['\"]"
    - all:
        - pattern: |
            string $NAME = $VALUE;
        - regex: "(?i)(Server=|Data Source=|Initial Catalog=|User Id=|Password=)"
    - all:
        - pattern: |
            string $NAME = $VALUE;
        - regex: "(?i)['\"]AKIA[0-9A-Z]{16}['\"]"
    - all:
        - pattern: |
            string $NAME = $VALUE;
        - regex: "(?i)['\"](xox[baprs]-[A-Za-z0-9-]{10,}|ghp_[A-Za-z0-9]{20,}|sk_(live|test)_[A-Za-z0-9]{16,})['\"]"
    - all:
        - pattern: |
            string $NAME = $VALUE;
        - regex: "-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----"
    - all:
        - pattern: |
            string $NAME = $VALUE;
        - regex: "(?i)(token|secret|key)\\s*=\\s*['\"][A-Za-z0-9+/=_\\-]{24,}['\"]"
