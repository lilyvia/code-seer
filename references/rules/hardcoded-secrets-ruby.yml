id: hardcoded-secrets-ruby
language: ruby
severity: error
message: '硬编码密钥（Ruby） (CWE-798)'
name: 硬编码密钥（Ruby）
description: 硬编码密钥是严重的安全风险，可能导致未授权访问和数据泄露。
cwe: CWE-798
remediation: |
  使用环境变量或密钥管理服务：
  ```ruby
  # 不安全的代码 ❌
  API_KEY = "sk-1234567890abcdef"
  PASSWORD = "mysecretpassword"

  # 安全的代码 ✅
  API_KEY = ENV["API_KEY"]
  PASSWORD = ENV["DB_PASSWORD"]

  # 或者使用密钥管理服务
  # AWS Secrets Manager、Azure Key Vault、HashiCorp Vault
  ```
rule:
  kind: assignment
  any:
  - all:
    - pattern: '$NAME = $VALUE'
      kind: assignment
    - regex: (?i)(api[_-]?key|secret[_-]?key|access[_-]?token|jwt[_-]?secret)\s*=\s*['"][A-Za-z0-9_\-\./+=]{12,}['"]
  - all:
    - pattern: '$NAME = $VALUE'
      kind: assignment
    - regex: (?i)(password|pwd|passwd)\s*=\s*['"][^'"]{6,}['"]
  - all:
    - pattern: '$NAME = $VALUE'
      kind: assignment
    - regex: (?i)(db[_-]?(user|username|password|pass|pwd)|database[_-]?url|connection[_-]?string)\s*=\s*['"][^'"]{8,}['"]
  - all:
    - pattern: '$NAME = $VALUE'
      kind: assignment
    - regex: (?i)(jdbc:mysql|jdbc:postgresql|mongodb(\+srv)?:\/\/|mysql:\/\/|postgres(ql)?:\/\/)
  - all:
    - pattern: '$NAME = $VALUE'
      kind: assignment
    - regex: (?i)['"]AKIA[0-9A-Z]{16}['"]
  - all:
    - pattern: '$NAME = $VALUE'
      kind: assignment
    - regex: (?i)['"](xox[baprs]-[A-Za-z0-9-]{10,}|ghp_[A-Za-z0-9]{20,}|sk_(live|test)_[A-Za-z0-9]{16,})['"]
  - all:
    - pattern: '$NAME = $VALUE'
      kind: assignment
    - regex: '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'
  - all:
    - pattern: '$NAME = $VALUE'
      kind: assignment
    - regex: (?i)(token|secret|key)\s*=\s*['"][A-Za-z0-9+/=_\-]{24,}['"]

  # false-negative coverage expansion - service token patterns
  - kind: assignment
    regex: '(?i)github_pat_[A-Za-z0-9_]{22,}'
  - kind: assignment
    regex: '(?i)glpat-[A-Za-z0-9\\-]{20,}'
  - kind: assignment
    regex: '(?i)dckr_pat_[A-Za-z0-9_-]{27,}'
  - kind: assignment
    regex: '(?i)npm_[A-Za-z0-9]{36}'
  - kind: assignment
    regex: '(?i)pypi-[A-Za-z0-9_-]{32,}'
  - kind: assignment
    regex: '(?i)sk-[A-Za-z0-9]{20,}'
  - kind: assignment
    regex: '(?i)sk-ant-[A-Za-z0-9]{32,}'
  - kind: assignment
    regex: '(?i)AIza[0-9A-Za-z_-]{35}'
  - kind: assignment
    regex: '(?i)pk_(live|test)_[A-Za-z0-9]{24,}'
  - kind: assignment
    regex: '(?i)SG\\.[A-Za-z0-9_-]{22,}'
  - kind: assignment
    regex: '(?i)key-[A-Fa-f0-9]{32}'
  - kind: assignment
    regex: '(?i)(mongodb|mysql|postgres|postgresql)://[^:]+:[^@]+@'
