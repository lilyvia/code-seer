id: php-path-traversal
language: php
name: 路径穿越漏洞（PHP）
description: PHP应用中常见路径穿越点包括file_get_contents、include/require、unlink等。
cwe: CWE-22
remediation: |
  使用realpath并校验目标路径必须位于允许目录内：
  ```php
  <?php
  // 不安全的代码 ❌
  $content = file_get_contents($_GET['file']);
  unlink($_POST['path']);
  // 安全的代码 ✅
  function safe_path(string $baseDir, string $userPath): string {
      $base = realpath($baseDir);
      $target = realpath($baseDir . DIRECTORY_SEPARATOR . $userPath);
      if ($base === false || $target === false || strpos($target, $base . DIRECTORY_SEPARATOR) !== 0) {
          throw new InvalidArgumentException('检测到路径穿越');
      }
      return $target;
  }
  $path = safe_path('/var/app/uploads', $_GET['file']);
  $content = file_get_contents($path);
  ?>
  ```
rule:
  any:
    - kind: function_call_expression
      pattern: file_get_contents($USER_PATH)
    - kind: function_call_expression
      pattern: include($USER_PATH)
    - kind: function_call_expression
      pattern: require($USER_PATH)
    - kind: function_call_expression
      pattern: file_put_contents($UPLOAD_PATH, $CONTENT)
    - kind: function_call_expression
      pattern: unlink($USER_PATH)
    - kind: binary_expression
      pattern: $BASE . $USER_PATH
    - kind: function_call_expression
      pattern: file_get_contents("../" . $USER_PATH)
    - kind: function_call_expression
      pattern: include("../" . $USER_PATH)
    - kind: function_call_expression
      pattern: unlink("../" . $USER_PATH)
