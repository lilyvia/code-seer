id: xss-php
language: php
severity: warning
message: 'XSS跨站脚本攻击（PHP） (CWE-79)'
name: XSS跨站脚本攻击（PHP）
description: PHP中常见的XSS漏洞来源：
cwe: CWE-79
remediation: '使用htmlspecialchars()转义输出：

  ```php

  // 不安全的代码 ❌

  echo $_GET[''name''];

  echo $userInput;

  print $userInput;

  // 安全的代码 ✅

  echo htmlspecialchars($_GET[''name''], ENT_QUOTES, ''UTF-8'');

  print htmlspecialchars($userInput, ENT_QUOTES, ''UTF-8'');

  ```

  推荐措施：

  - 所有输出到HTML上下文的变量都使用htmlspecialchars()

  - 对富文本输入使用白名单过滤

  - 启用CSP降低XSS利用风险

  '
rule:
  any:
  - all:
    - pattern: 'echo $USER_INPUT;

        '
    - not:
        pattern: 'echo htmlspecialchars($$$ARGS);

          '
  - all:
    - pattern: 'print $USER_INPUT;

        '
    - not:
        pattern: 'print htmlspecialchars($$$ARGS);

          '

  # false-negative coverage expansion
  - kind: program
    regex: 'echo\s+\$(_GET|_POST|user|input|param|request|query|body|payload)'
  - kind: program
    regex: 'print\s+\$(_GET|_POST|user|input|param|request|query|body|payload)'
