id: php-xss
language: php
name: XSS跨站脚本攻击（PHP）
message: 检测到XSS漏洞：未转义的用户输入直接输出
description: |
  PHP中常见的XSS漏洞来源：
  - echo 输出用户输入
  - print 输出用户输入
  - printf 格式化输出用户输入
  - <?= ?> 短标签输出

severity: error
cwe: CWE-79

remediation: |
  使用htmlspecialchars()转义输出：

  ```php
  // 不安全的代码 ❌
  echo $_GET['name'];
  echo $userInput;
  print $userInput;

  // 安全的代码 ✅
  echo htmlspecialchars($_GET['name'], ENT_QUOTES, 'UTF-8');
  print htmlspecialchars($userInput, ENT_QUOTES, 'UTF-8');
  ```

  推荐措施：
  - 所有输出到HTML上下文的变量都使用htmlspecialchars()
  - 对富文本输入使用白名单过滤
  - 启用CSP降低XSS利用风险

rule:
  any:
    - all:
        - pattern: |
            echo $USER_INPUT;
        - not:
            pattern: |
              echo htmlspecialchars($$$ARGS);
    - all:
        - pattern: |
            print $USER_INPUT;
        - not:
            pattern: |
              print htmlspecialchars($$$ARGS);
